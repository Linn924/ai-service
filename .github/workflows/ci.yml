name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  frontend-uniapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-uniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-uniapp/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build:mp-weixin

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-ruoyi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn -DskipTests package
