services:
  mysql:
    image: mysql:8.0
    container_name: ai-service-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - ./volumes/mysql:/var/lib/mysql
      - ../backend-ruoyi/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-service-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    container_name: ai-service-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT}
      RUOYI_PROFILE: ${RUOYI_PROFILE}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USE_SSL: ${MYSQL_USE_SSL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DATABASE: ${REDIS_DATABASE}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_DIFY_API_URL: ${AI_DIFY_API_URL}
      AI_DIFY_API_KEY: ${AI_DIFY_API_KEY}
      AI_DIFY_RESPONSE_MODE: ${AI_DIFY_RESPONSE_MODE}
      AI_DIFY_USER: ${AI_DIFY_USER}
    volumes:
      - ./volumes/upload:${RUOYI_PROFILE}

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-service-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
